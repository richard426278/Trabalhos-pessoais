<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RickGames</title>

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    /* MENU */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-bottom: 2px solid red;
    }

    nav h1 {
      color: red;
    }

    nav .menu {
      display: flex;
      gap: 20px; /* 🔥 resolve o colado */
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    /* CONTEÚDO */
    .container {
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .card h3 {
      color: red;
      margin-bottom: 10px;
    }

    .card p {
      word-break: break-word; /* 🔥 resolve email vazando */
    }

    /* RESPONSIVO */
    @media (max-width: 600px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <nav>
    <h1>RickGames</h1>

    <div class="menu">
      <a href="#">INÍCIO</a>
      <a href="#">SOBRE</a>
      <a href="#">PRODUTOS</a>
      <a href="#">CONTATO</a>
    </div>
  </nav>

  <!-- CONTEÚDO -->
  <div class="container">
    <h2>Fale com a gente</h2>

    <div class="cards">

      <div class="card">
        <h3>E-mail</h3>
        <p>rickgames@gmail.com</p>
      </div>

      <div class="card">
        <h3>WhatsApp</h3>
        <p>(11) 99999-0000</p>
      </div>

      <div class="card">
        <h3>Instagram</h3>
        <p>@rickgames</p>
      </div>

      <div class="card">
        <h3>Horário</h3>
        <p>
          Segunda a sexta: 9h às 21h<br>
          Sábado: 10h às 18h
        </p>
      </div>

    </div>
  </div>

</body>
</html>
